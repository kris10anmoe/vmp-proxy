<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinrådgiver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">🍷</div>
  <div>
    <h1>Vinrådgiver</h1>
    <p>Søker direkte i Vinmonopolets katalog</p>
  </div>
</header>

<div id="chat">
  <div class="mb">
    <div class="mb-text">Hei! Fortell meg hva du er ute etter – en vin til middag, en bestemt produsent, et område, eller et budsjett. Du kan også spørre «Hvilke butikker har denne vinen?» etter at jeg har funnet en vin.</div>
    <div class="chips" id="chips">
      <button class="chip" onclick="qs('Finn viner fra Domaine du Pélican i Jura')">Pélican i Jura</button>
      <button class="chip" onclick="qs('Frisk hvitvin til sjømat under 200 kr')">Hvitvin til sjømat</button>
      <button class="chip" onclick="qs('Kraftig rødvin fra Italia')">Kraftig italiensk rødvin</button>
      <button class="chip" onclick="qs('Champagne til fest')">Champagne</button>
      <button class="chip" onclick="qs('Naturvin eller biodynamisk vin')">Naturvin</button>
      <button class="chip" onclick="qs('Rødvin fra Portugal under 300 kr')">Portugisisk rødvin</button>
    </div>
  </div>
</div>

<footer>
   <div class="inp-row">
    <input type="text" id="inp" placeholder="Hva leter du etter?" />
    <button class="send" id="sbtn" onclick="send()">Send</button>
  </div>
</footer>

<script src="vin.js?v=3"></script>
<script src="agent.js?v=3"></script>
<script src="app.js?v=3"></script>

</body>
</html>
